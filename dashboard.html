<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>

<!-- tailwind+daisy -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome cdn -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style/index.css">
</head>
<body>
<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<div class="bg-white shadow-md p-4 flex flex-col md:flex-row justify-between items-center gap-3">
   <h1 class="font-bold text-xl flex items-center gap-2">
    <span><img src="IMG/githu logo small.png" class="w-8 h-8 object-contain" alt="Logo">
    </span>GitHub Issues Tracker</h1>
    <div class="flex flex-col md:flex-row gap-2 w-full md:w-auto">
        <input id="searchInput" type="text" placeholder="Search issues..." class="border border-gray-500/30 p-2 rounded w-full md:w-auto">
        <button onclick="searchIssue()" class="bg-[#4A00FF] text-white px-4 py-2 rounded hover:bg-[#3c00cc] transition"><i class="fa-solid fa-plus"></i> New Issue</button>
    </div>
</div>

<!-- Tabs -->

    <!-- Issues Container -->
     <div class="p-6">
    <div class="flex gap-4 flex-wrap mb-6">
        <button onclick="loadIssues()" class="tab-btn px-4 py-2 bg-gray-200 bg-[#4A00FF] rounded" data-status="all">All</button>
        <button onclick="filterStatus('open')" class="tab-btn px-4 py-2 bg-gray-200 bg-[#4A00FF] rounded" data-status="open">Open</button>
        <button onclick="filterStatus('closed')" class="tab-btn px-4 py-2 bg-gray-200 bg-[#4A00FF] rounded" data-status="closed">Closed</button>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-sm border-gray-500/30 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        
        <div class="flex items-center gap-4">
    <div class="bg-purple-100 p-3 rounded-full flex items-center justify-center">
        <img src="IMG/Group 1.png" class="w-6 h-6 object-contain" alt="Icon">
    </div>
    <div>
        <h2 id="issueCount" class="text-2xl font-bold text-gray-800">0 Issues</h2>
        <p class="text-gray-400 text-sm font-medium">Track and manage your project issues</p>
    </div>
</div>

        <div class="flex gap-6 items-center">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-green-500"></span>
                <span class="text-sm font-semibold text-gray-700">Open</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                <span class="text-sm font-semibold text-gray-700">Closed</span>
            </div>
        </div>
    </div>
    <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
</div>
</div>

<!-- Modal -->
<div id="issueModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-2xl relative">
        
        <div id="modalContent">
            </div>
        
    </div>
</div>

    <script src="script/app.js"></script>
</body>
</html>
