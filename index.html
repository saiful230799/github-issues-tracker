<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>

<!-- tailwind+daisy -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome cdn -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style/index.css">
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

<div class="bg-white w-96 p-8 rounded-lg shadow">

<div class="text-center mb-6">

<img
src="IMG/github logo big.png"
class="w-12 mx-auto mb-3">

<h1 class="text-xl font-bold">
GitHub Issues Tracker
</h1>

<p class="text-gray-500 text-sm">
Sign in to manage your issues
</p>

</div>

<form id="loginForm">

<label class="text-sm font-medium">Username</label>

<input
id="username"
type="text"
placeholder="Enter Username"
class="w-full border rounded p-2 mt-1 mb-1">

<p class="text-xs text-purple-600 mb-3">
Default: admin
</p>

<label class="text-sm font-medium">Password</label>

<input
id="password"
type="password"
placeholder="Enter Password"
class="w-full border rounded p-2 mt-1 mb-1">

<p class="text-xs text-purple-600 mb-4">
Default: admin123
</p>

<button
class="w-full py-2 text-white rounded bg-[#4A00FF] hover:bg-[#3c00cc] transition-all font-semibold shadow-lg">
  Sign In
</button>
</form>

<div class="text-center my-4 text-gray-400 text-sm">
OR
</div>
<p class="text-xs text-gray-500 font-medium text-center mb-2">Demo Credentials:</p>


<div class="bg-gray-100 p-3 rounded text-center text-sm">

<p>Username: admin</p>
<p>Password: admin123</p>

</div>

</div>

<script src="script/login.js"></script>

</body>
</html>
